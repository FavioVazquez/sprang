name: Publish to npm

# Triggered two ways:
#   1. Pushing a v* tag (the canonical release path).
#   2. Manually via workflow_dispatch on main (used when a tag can't be pushed
#      directly, e.g. from a restricted environment). On dispatch the job creates
#      the tag itself when it cuts the GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (must match packages/cli/package.json, e.g. 0.2.2)'
        required: false

jobs:
  build-and-test:
    name: Full CI before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  publish:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: write   # create the git tag + GitHub Release
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Build dashboard static files
        run: pnpm --filter @sprang/dashboard build

      - name: Resolve & verify version
        id: ver
        run: |
          PKG_VERSION=$(node -e "console.log(require('./packages/cli/package.json').version)")
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $PKG_VERSION (tag v$PKG_VERSION)"
          # On a tag push, the tag must match package.json.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            [ "${{ github.ref_name }}" = "v$PKG_VERSION" ] || \
              { echo "ERROR: tag ${{ github.ref_name }} does not match package.json v$PKG_VERSION"; exit 1; }
          fi
          # On manual dispatch with an explicit version input, it must match too.
          if [ -n "${{ github.event.inputs.version }}" ]; then
            [ "${{ github.event.inputs.version }}" = "$PKG_VERSION" ] || \
              { echo "ERROR: input ${{ github.event.inputs.version }} does not match package.json $PKG_VERSION"; exit 1; }
          fi

      - name: Verify all package versions match
        run: |
          PKG_VERSION="${{ steps.ver.outputs.version }}"
          for pkg in packages/core/package.json packages/mcp/package.json packages/dashboard/package.json; do
            V=$(node -e "console.log(require('./$pkg').version)")
            echo "$pkg: $V"
            [ "$V" = "$PKG_VERSION" ] || (echo "ERROR: $pkg version $V does not match $PKG_VERSION" && exit 1)
          done
          echo "All package versions match $PKG_VERSION ✓"

      - name: Verify plugin manifests match version
        run: |
          PKG_VERSION="${{ steps.ver.outputs.version }}"
          # Only the versioned plugin manifests are checked here. marketplace.json
          # (a Claude marketplace listing) and .devin/config.json (an mcpServers
          # block) intentionally carry no version field, so they are excluded.
          for f in .claude-plugin/plugin.json .copilot-plugin/plugin.json; do
            if [ -f "$f" ]; then
              V=$(node -e "console.log(require('./$f').version || '?')")
              echo "$f: $V"
              [ "$V" = "$PKG_VERSION" ] || (echo "ERROR: $f version $V does not match $PKG_VERSION" && exit 1)
            fi
          done

      - name: Copy dashboard dist and MCP server into CLI package
        run: node packages/cli/scripts/pack-assets.mjs

      - name: Publish to npm (idempotent)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/cli
          NAME=$(node -e "console.log(require('./package.json').name)")
          VERSION="${{ steps.ver.outputs.version }}"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — skipping npm publish"
          else
            npm publish --provenance --access public
            echo "Published $NAME@$VERSION ✓"
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          awk -v ver="## [$VERSION]" 'index($0,ver)==1{f=1;next} /^## \[/{if(f)exit} f' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${{ steps.ver.outputs.tag }}" > RELEASE_NOTES.md
          fi
          echo "----- release notes -----"
          cat RELEASE_NOTES.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating notes"
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes-file RELEASE_NOTES.md
          else
            echo "Creating release $TAG at $GITHUB_SHA"
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" \
              --title "$TAG" --notes-file RELEASE_NOTES.md
          fi
