name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-test:
    name: Full CI before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Build dashboard static files
        run: pnpm --filter @sprang/dashboard build

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(node -e "const p=JSON.parse(require('fs').readFileSync('packages/cli/package.json','utf-8')); console.log(p.version)")"
          echo "Tag: $TAG  |  package.json: $PKG_VERSION"
          [ "$TAG" = "$PKG_VERSION" ] || (echo "ERROR: Tag $TAG does not match CLI package.json $PKG_VERSION" && exit 1)

      - name: Verify all package versions match
        run: |
          PKG_VERSION=$(node -e "const p=JSON.parse(require('fs').readFileSync('packages/cli/package.json','utf-8')); console.log(p.version)")
          echo "Expected version: $PKG_VERSION"
          for pkg in packages/core/package.json packages/mcp/package.json packages/dashboard/package.json; do
            V=$(node -e "const p=JSON.parse(require('fs').readFileSync('$pkg','utf-8')); console.log(p.version)")
            echo "$pkg: $V"
            [ "$V" = "$PKG_VERSION" ] || (echo "ERROR: $pkg version $V does not match $PKG_VERSION" && exit 1)
          done
          echo "All package versions match $PKG_VERSION ✓"

      - name: Verify plugin manifests match version
        run: |
          PKG_VERSION=$(node -e "const p=JSON.parse(require('fs').readFileSync('packages/cli/package.json','utf-8')); console.log(p.version)")
          # Only the versioned plugin manifests are checked here. marketplace.json
          # (a Claude marketplace listing) and .devin/config.json (an mcpServers
          # block) intentionally carry no version field, so they are excluded.
          for f in .claude-plugin/plugin.json .copilot-plugin/plugin.json; do
            if [ -f "$f" ]; then
              V=$(node -e "
                const d=JSON.parse(require('fs').readFileSync('$f','utf-8'));
                console.log(d.version || d.manifest?.version || d.server?.version || '?');
              ")
              echo "$f: $V"
              [ "$V" = "$PKG_VERSION" ] || (echo "ERROR: $f version $V does not match $PKG_VERSION" && exit 1)
            fi
          done

      - name: Copy dashboard dist and MCP server into CLI package
        run: node packages/cli/scripts/pack-assets.mjs

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/cli
          npm publish --provenance --access public
