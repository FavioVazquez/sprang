name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-and-test:
    name: Build, typecheck, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test -- --coverage

      - name: Validate plugin manifests
        run: |
          node -e "
            const files = [
              '.claude-plugin/plugin.json',
              '.claude-plugin/marketplace.json',
              '.copilot-plugin/plugin.json',
              '.devin/config.json',
              '.mcp.json',
              '.vscode/mcp.json',
            ];
            let ok = true;
            for (const f of files) {
              try {
                const data = JSON.parse(require('fs').readFileSync(f, 'utf-8'));
                console.log('✓', f);
              } catch (e) {
                console.error('✗', f, e.message);
                ok = false;
              }
            }
            if (!ok) process.exit(1);
          "

  e2e:
    name: Playwright e2e tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        run: pnpm --filter @sprang/dashboard build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/playwright.config.ts', '**/package.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browsers
        run: pnpm --filter @sprang/dashboard exec playwright install chromium

      - name: Run e2e tests
        run: pnpm --filter @sprang/dashboard exec playwright test

      - name: Run platform bridge e2e tests (mock claude/copilot CLIs)
        run: pnpm --filter @sprang/dashboard exec playwright test --config playwright.bridge.config.ts
