name: Sprang Knowledge Graph Refresh

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  refresh:
    name: Refresh Sprang knowledge graph
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Sprang CLI
        run: pnpm build

      - name: Run Sprang scan
        run: node packages/cli/dist/index.js scan . --skip-llm

      - name: Commit updated graph files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .sprang/knowledge-graph.json .sprang/SPRANG_REPORT.md .sprang/annotations/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh Sprang knowledge graph [skip ci]"
            git push
          fi
